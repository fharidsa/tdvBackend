tdv:
  printer:
    host: ${PRINTER_HOST:192.168.1.80}
    port: ${PRINTER_PORT:9100}
    enabled: ${PRINTER_ENABLED:true}
    connect-timeout-ms: ${PRINTER_CONNECT_TIMEOUT_MS:3000}
    socket-timeout-ms: ${PRINTER_SOCKET_TIMEOUT_MS:3000}
  security:
    jwt:
      secret: ${TDV_JWT_SECRET:change-me-use-long-random-secret-in-production}
  bootstrap:
    login: ${TDV_BOOTSTRAP_LOGIN:sys}
    display-name: ${TDV_BOOTSTRAP_DISPLAY_NAME:sistema}
    password: ${TDV_BOOTSTRAP_PASSWORD:123}

tyt-rfid:
  enabled: ${TYT_RFID_ENABLED:true}
  base-url: ${TYT_RFID_BASE_URL:https://192.168.1.55:8080/TyT_Rfid_Be}
  host-header: ${TYT_RFID_HOST_HEADER:devapps.tdv.pe}
  client-id: ${TYT_RFID_CLIENT_ID:Re8sv3b5E1fHhavKpwBjFh}
  client-secret: ${TYT_RFID_CLIENT_SECRET:Ep172VuCUGxHmgjZrzxP4bE4db7DCWHgCk7pD8shgQxv}
  ssl-verify: ${TYT_RFID_SSL_VERIFY:false}
  connect-timeout-ms: ${TYT_RFID_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${TYT_RFID_READ_TIMEOUT_MS:15000}

server:
  error:
    include-message: always
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    org.tdv.tdvbackend.integration.tytRfid: DEBUG

spring:
  application:
    name: tdvBackend
  data:
    web:
      pageable:
        max-page-size: 500
        one-indexed-parameters: false
  datasource:
    url: jdbc:sqlserver://localhost;instanceName=MSSQLSERVER;port=1433;databaseName=tdvinvento;encrypt=false;trustServerCertificate=true
    username: sa
    password: ${SQLSERVER_PASSWORD:PasswordO1.}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
