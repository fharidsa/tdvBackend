tdv:
  printer:
    host: ${PRINTER_HOST:192.168.1.80}
    port: ${PRINTER_PORT:9100}
    enabled: ${PRINTER_ENABLED:true}
    connect-timeout-ms: ${PRINTER_CONNECT_TIMEOUT_MS:3000}
    socket-timeout-ms: ${PRINTER_SOCKET_TIMEOUT_MS:3000}
  security:
    jwt:
      secret: ${TDV_JWT_SECRET:change-me-use-long-random-secret-in-production}
  bootstrap:
    login: ${TDV_BOOTSTRAP_LOGIN:sys}
    display-name: ${TDV_BOOTSTRAP_DISPLAY_NAME:sistema}
    password: ${TDV_BOOTSTRAP_PASSWORD:123}

server:
  error:
    include-message: always
    include-binding-errors: never
    include-stacktrace: never

spring:
  application:
    name: tdvBackend
  data:
    web:
      pageable:
        max-page-size: 500
        one-indexed-parameters: false
  datasource:
    url: jdbc:sqlserver://localhost;instanceName=MSSQLSERVER;port=1433;databaseName=tdvinvento;encrypt=false;trustServerCertificate=true
    username: sa
    password: ${SQLSERVER_PASSWORD:PasswordO1.}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
